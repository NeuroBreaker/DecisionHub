services:
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - decision_hub-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/decision_hub-db
    depends_on:
      - db
    networks:
      - decision_hub-network

  db:
    image: postgres:alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: decision_hub-db
    ports:
      - "6752:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - decision_hub-network 

volumes:
  pgdata:

networks:
  decision_hub-network:
    driver: bridge
