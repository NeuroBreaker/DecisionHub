services:
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - decision_hub-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres+asyncpg://postgres:123456@db:5432/decision_hub-db
    depends_on:
      - db
    networks:
      - decision_hub-network

  db:
    image: postgres:alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: decision_hub-db
    ports:
      - "6752:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - decision_hub-network 

volumes:
  pgdata:

networks:
  decision_hub-network:
    driver: bridge
